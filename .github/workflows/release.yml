name: Release

on:
  push:
    tags:
      - "@bundt/*@*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish & Release
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Parse tag
        id: tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Tag format: @bundt/<name>@<version>
          PACKAGE_NAME=$(echo "$TAG" | sed 's/@[^@]*$//')
          VERSION=$(echo "$TAG" | sed 's/.*@//')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "package=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing $PACKAGE_NAME@$VERSION"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      - name: Build
        run: turbo run build --filter=${{ steps.tag.outputs.package }}

      - name: Typecheck
        run: turbo run typecheck --filter=${{ steps.tag.outputs.package }}

      - name: Test
        run: turbo run test --filter=${{ steps.tag.outputs.package }}

      - name: Publish to npm
        run: |
          PACKAGE_DIR=$(node -e "
            const pkg = '${{ steps.tag.outputs.package }}';
            const fs = require('fs');
            const dirs = ['apps', 'packages', 'internal'];
            for (const dir of dirs) {
              try {
                const entries = fs.readdirSync(dir);
                for (const entry of entries) {
                  const pjson = JSON.parse(fs.readFileSync(dir + '/' + entry + '/package.json', 'utf8'));
                  if (pjson.name === pkg) {
                    console.log(dir + '/' + entry);
                    process.exit(0);
                  }
                }
              } catch {}
            }
            process.exit(1);
          ")
          cd "$PACKAGE_DIR"
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --title "${{ steps.tag.outputs.package }}@${{ steps.tag.outputs.version }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
