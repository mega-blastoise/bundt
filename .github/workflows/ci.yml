name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      - name: Typecheck
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            bun run typecheck -- --filter="...[HEAD^1]"
          else
            bun run typecheck
          fi

      - name: Build
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            bun run build -- --filter="...[HEAD^1]"
          else
            bun run build
          fi

      - name: Test
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            bun run test -- --filter="...[HEAD^1]"
          else
            bun run test
          fi
